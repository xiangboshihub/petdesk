<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetClaw Original Cat</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .pet {
      position: relative;
      width: 176px;
      height: 176px;
      cursor: grab;
    }

    .pet:active {
      cursor: grabbing;
    }

    .layer {
      position: absolute;
      inset: 0;
    }

    .symbol-entry {
      position: absolute;
      left: 50%;
      top: 4px;
      transform: translateX(-50%);
      width: 116px;
      padding: 4px 4px 3px;
      border-radius: 9px;
      background: rgba(12, 16, 24, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 4;
    }

    .symbol-entry.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .symbol-entry-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 3px;
      margin-bottom: 3px;
      font: 600 8px/1.15 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: rgba(240, 244, 250, 0.92);
    }

    .symbol-entry-close {
      border: 0;
      background: transparent;
      color: rgba(198, 208, 226, 0.86);
      font: inherit;
      cursor: pointer;
      padding: 0;
      pointer-events: auto;
    }

    .symbol-entry-form {
      display: grid;
      gap: 2px;
    }

    .symbol-entry-input {
      width: 100%;
      height: 19px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: #f8fbff;
      outline: none;
      padding: 0 6px;
      font: 600 8px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    .symbol-entry-input::placeholder {
      color: rgba(184, 195, 213, 0.62);
    }

    .symbol-entry-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }

    .symbol-entry-submit {
      height: 18px;
      border: 0;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: #f8fbff;
      font: 600 8px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      cursor: pointer;
      pointer-events: auto;
    }

    .symbol-entry-remove {
      background: rgba(255, 107, 129, 0.14);
      color: #ffb1bd;
    }

    .symbol-entry-status {
      min-height: 8px;
      font: 500 6px/1.1 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: rgba(190, 202, 221, 0.8);
    }

    .symbol-entry-status.is-error {
      color: #ff9f9f;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent !important;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
      pointer-events: none;
      opacity: 0;
      transition: opacity 90ms linear;
    }

    video.is-visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="pet" id="pet">
    <div class="layer">
      <video id="catA" muted autoplay playsinline preload="auto"></video>
      <video id="catB" muted autoplay playsinline preload="auto"></video>
    </div>
    <div class="symbol-entry" id="symbolEntry" hidden>
      <div class="symbol-entry-top">
        <span>切换股票</span>
        <button class="symbol-entry-close" id="symbolEntryClose" type="button">关闭</button>
      </div>
      <form class="symbol-entry-form" id="symbolEntryForm">
        <input class="symbol-entry-input" id="symbolEntryInput" type="text" inputmode="text" autocomplete="off" spellcheck="false" placeholder="代码或名称">
        <input class="symbol-entry-input" id="symbolCostInput" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" placeholder="成本价，可不填">
        <div class="symbol-entry-actions">
          <button class="symbol-entry-submit" id="symbolEntrySubmit" type="submit">保存切换</button>
          <button class="symbol-entry-submit symbol-entry-remove" id="symbolEntryRemove" type="button">删除当前</button>
        </div>
        <div class="symbol-entry-status" id="symbolEntryStatus">双击输入，右键关闭</div>
      </form>
    </div>
  </div>
  <script>
    const catA = document.getElementById("catA");
    const catB = document.getElementById("catB");
    const pet = document.getElementById("pet");
    const symbolEntry = document.getElementById("symbolEntry");
    const symbolEntryForm = document.getElementById("symbolEntryForm");
    const symbolEntryInput = document.getElementById("symbolEntryInput");
    const symbolCostInput = document.getElementById("symbolCostInput");
    const symbolEntryClose = document.getElementById("symbolEntryClose");
    const symbolEntryRemove = document.getElementById("symbolEntryRemove");
    const symbolEntryStatus = document.getElementById("symbolEntryStatus");
    const LISTEN_BEFORE_TYPING_MS = 2500;
    const SLEEP_AFTER_MS = 120000;
    const clips = {
      begin: { src: "../../Resources/begin.webm", loop: false, next: "idle" },
      idle: { src: "../../Resources/static.webm", loop: true },
      listening: { src: "../../Resources/listening.webm", loop: true, waitOnExit: true, startAt: 6.2 },
      typingStart: { src: "../../Resources/task-start.webm", loop: false, next: "typingLoop", waitOnExit: true },
      typingLoop: { src: "../../Resources/task-loop.webm", loop: true, waitOnExit: true },
      typingLeave: { src: "../../Resources/task-leave.webm", loop: false, next: "idle" },
      sleepStart: { src: "../../Resources/sleep-start.webm", loop: false, next: "sleepLoop" },
      sleepLoop: { src: "../../Resources/sleep-loop.webm", loop: true },
      sleepLeave: { src: "../../Resources/sleep-leave.webm", loop: false, next: "idle" },
    };
    const immediateStates = new Set(["idle", "typingStart"]);

    let mode = "idle";
    let phase = "idle";
    let queuedPhase = null;
    let activeVideo = catA;
    let inactiveVideo = catB;
    let transitionToken = 0;
    let dragging = false;
    let lastX = 0;
    let lastY = 0;
    let sleepTimer = null;
    let typingIntroTimer = null;
    let mousePassthrough = false;
    let hitTestQueued = false;
    let lastPointerEvent = null;
    let symbolEntryOpen = false;
    const hitCanvas = document.createElement("canvas");
    const hitContext = hitCanvas.getContext("2d", { willReadFrequently: true });

    // Warm the browser cache so clip switches are less jarring.
    const preloadedVideos = Object.values(clips).map((clip) => {
      const video = document.createElement("video");
      video.preload = "auto";
      video.muted = true;
      video.src = clip.src;
      return video;
    });

    activeVideo.classList.add("is-visible");

    function setMousePassthrough(ignore) {
      if (mousePassthrough === ignore) return;
      mousePassthrough = ignore;
      window.electronAPI.setMousePassthrough(ignore);
    }

    function clearClickOpenTimer() {
      return;
    }

    function setEntryStatus(text, isError = false) {
      symbolEntryStatus.textContent = text;
      symbolEntryStatus.classList.toggle("is-error", Boolean(isError));
    }

    function openSymbolEntry() {
      symbolEntry.hidden = false;
      symbolEntry.classList.add("is-visible");
      symbolEntryOpen = true;
      setMousePassthrough(false);
      setEntryStatus("右键输入，双击切模式");
      window.electronAPI.getMarketSnapshot().then((snapshot) => {
        const activeSymbol = snapshot?.activeSymbol || {};
        symbolEntryInput.value = activeSymbol?.code || activeSymbol?.name || "";
        symbolCostInput.value =
          typeof activeSymbol?.levels?.costPrice === "number"
            ? activeSymbol.levels.costPrice.toFixed(2)
            : "";
      }).catch(() => {
        symbolEntryInput.value = "";
        symbolCostInput.value = "";
      }).finally(() => {
        window.setTimeout(() => {
          symbolEntryInput.focus();
          symbolEntryInput.select();
        }, 0);
      });
    }

    function closeSymbolEntry() {
      symbolEntryOpen = false;
      symbolEntry.classList.remove("is-visible");
      symbolEntry.hidden = true;
      symbolEntryInput.blur();
      symbolCostInput.blur();
      symbolEntryInput.value = "";
      symbolCostInput.value = "";
      symbolEntryInput.disabled = false;
      symbolCostInput.disabled = false;
      symbolEntryRemove.disabled = false;
      setEntryStatus("右键输入，双击切模式");
      if (!dragging && lastPointerEvent) {
        queueHitTest(lastPointerEvent);
      } else if (!dragging) {
        setMousePassthrough(true);
      }
    }

    async function submitSymbolEntry() {
      setEntryStatus("正在切换…");
      symbolEntryInput.disabled = true;
      symbolCostInput.disabled = true;
      symbolEntryRemove.disabled = true;

      try {
        const result = await window.electronAPI.activateSymbolInput({
          input: symbolEntryInput.value.trim(),
          cost: symbolCostInput.value.trim(),
        });
        const actionText = result?.added ? "已新增并切换到" : "已切换到";
        setEntryStatus(`${actionText} ${result?.symbol?.name || symbolEntryInput.value.trim()}`);
        window.setTimeout(() => {
          closeSymbolEntry();
        }, 420);
      } catch (error) {
        setEntryStatus(error?.message || String(error), true);
      } finally {
        symbolEntryInput.disabled = false;
        symbolCostInput.disabled = false;
        symbolEntryRemove.disabled = false;
      }
    }

    async function removeCurrentSymbol() {
      setEntryStatus("正在删除当前股票…");
      symbolEntryInput.disabled = true;
      symbolCostInput.disabled = true;
      symbolEntryRemove.disabled = true;

      try {
        const result = await window.electronAPI.activateSymbolInput({
          action: "delete-current",
        });
        setEntryStatus(`已删除 ${result?.symbol?.name || "当前股票"}`);
        window.setTimeout(() => {
          closeSymbolEntry();
        }, 320);
      } catch (error) {
        setEntryStatus(error?.message || String(error), true);
      } finally {
        symbolEntryInput.disabled = false;
        symbolCostInput.disabled = false;
        symbolEntryRemove.disabled = false;
      }
    }

    function clearSleepTimer() {
      if (!sleepTimer) return;
      window.clearTimeout(sleepTimer);
      sleepTimer = null;
    }

    function clearTypingIntroTimer() {
      if (!typingIntroTimer) return;
      window.clearTimeout(typingIntroTimer);
      typingIntroTimer = null;
    }

    function clipStartTime(clip) {
      return typeof clip.startAt === "number" ? clip.startAt : 0;
    }

    function getVideoContentRect(video) {
      const bounds = video.getBoundingClientRect();
      const sourceWidth = video.videoWidth || bounds.width;
      const sourceHeight = video.videoHeight || bounds.height;

      if (!sourceWidth || !sourceHeight || !bounds.width || !bounds.height) {
        return null;
      }

      const scale = Math.min(bounds.width / sourceWidth, bounds.height / sourceHeight);
      const width = sourceWidth * scale;
      const height = sourceHeight * scale;

      return {
        left: bounds.left + (bounds.width - width) / 2,
        top: bounds.top + (bounds.height - height) / 2,
        width,
        height,
        sourceWidth,
        sourceHeight,
      };
    }

    function isEntryHit(event) {
      if (!symbolEntryOpen || symbolEntry.hidden) {
        return false;
      }

      const rect = symbolEntry.getBoundingClientRect();
      const x = event.clientX;
      const y = event.clientY;
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    function isOpaqueAtPointer(event) {
      if (isEntryHit(event)) {
        return true;
      }

      const video = activeVideo;
      if (!video || video.readyState < 2 || !video.videoWidth || !video.videoHeight) {
        return false;
      }

      const rect = getVideoContentRect(video);
      if (!rect) return false;

      const x = event.clientX;
      const y = event.clientY;
      if (x < rect.left || x >= rect.left + rect.width || y < rect.top || y >= rect.top + rect.height) {
        return false;
      }

      if (hitCanvas.width !== rect.sourceWidth || hitCanvas.height !== rect.sourceHeight) {
        hitCanvas.width = rect.sourceWidth;
        hitCanvas.height = rect.sourceHeight;
      }

      hitContext.clearRect(0, 0, hitCanvas.width, hitCanvas.height);
      hitContext.drawImage(video, 0, 0, hitCanvas.width, hitCanvas.height);

      const sourceX = Math.max(0, Math.min(hitCanvas.width - 1, Math.floor(((x - rect.left) / rect.width) * hitCanvas.width)));
      const sourceY = Math.max(0, Math.min(hitCanvas.height - 1, Math.floor(((y - rect.top) / rect.height) * hitCanvas.height)));
      const alpha = hitContext.getImageData(sourceX, sourceY, 1, 1).data[3];
      return alpha > 24;
    }

    function queueHitTest(event) {
      lastPointerEvent = event;
      if (hitTestQueued) return;
      hitTestQueued = true;
      requestAnimationFrame(() => {
        hitTestQueued = false;
        if (!lastPointerEvent || dragging) return;
        if (symbolEntryOpen) {
          setMousePassthrough(false);
          return;
        }
        setMousePassthrough(!isOpaqueAtPointer(lastPointerEvent));
      });
    }

    function scheduleTypingStart() {
      if (typingIntroTimer) return;
      typingIntroTimer = window.setTimeout(() => {
        typingIntroTimer = null;
        if (mode !== "typing") return;

        if (phase === "typingStart" || phase === "typingLoop") {
          return;
        }

        if (phase === "sleepLeave") {
          queuedPhase = "typingStart";
          return;
        }

        requestState("typingStart");
      }, LISTEN_BEFORE_TYPING_MS);
    }

    function transitionTo(key) {
      const clip = clips[key];
      if (!clip) return;
      phase = key;
      queuedPhase = null;
      const token = ++transitionToken;
      const nextVideo = inactiveVideo;
      const previousVideo = activeVideo;

      nextVideo.pause();
      nextVideo.loop = false;
      nextVideo.src = clip.src;
      nextVideo.load();

      const showPreparedVideo = () => {
        if (token !== transitionToken) return;

        try {
          nextVideo.currentTime = clipStartTime(clip);
        } catch {}

        nextVideo.play().catch(() => {});
        requestAnimationFrame(() => {
          if (token !== transitionToken) return;

          nextVideo.classList.add("is-visible");
          previousVideo.classList.remove("is-visible");
          activeVideo = nextVideo;
          inactiveVideo = previousVideo;
          if (lastPointerEvent) {
            queueHitTest(lastPointerEvent);
          }

          window.setTimeout(() => {
            if (inactiveVideo === previousVideo) {
              previousVideo.pause();
            }
          }, 120);
        });
      };

      if (nextVideo.readyState >= 2) {
        showPreparedVideo();
      } else {
        nextVideo.addEventListener("canplay", showPreparedVideo, { once: true });
      }
    }

    function scheduleSleep() {
      clearSleepTimer();
      sleepTimer = window.setTimeout(() => {
        if (mode === "idle") {
          mode = "sleep";
          transitionTo("sleepStart");
        }
      }, SLEEP_AFTER_MS);
    }

    function enterIdle() {
      mode = "idle";
      transitionTo("idle");
      scheduleSleep();
    }

    function enterTyping() {
      clearSleepTimer();
      if (phase === "typingStart" || phase === "typingLoop") {
        mode = "typing";
        queuedPhase = null;
        clearTypingIntroTimer();
        return;
      }

      mode = "typing";

      if (phase === "sleepStart" || phase === "sleepLoop") {
        queuedPhase = "listening";
        transitionTo("sleepLeave");
        scheduleTypingStart();
        return;
      }

      if (phase === "sleepLeave") {
        queuedPhase = "listening";
        scheduleTypingStart();
        return;
      }

      if (phase !== "listening") {
        requestState("listening");
      }

      scheduleTypingStart();
    }

    function enterIdleFromTyping() {
      mode = "idle";
      clearTypingIntroTimer();

      if (phase === "listening" || phase === "sleepLeave") {
        requestState("idle");
        scheduleSleep();
        return;
      }

      requestState("typingLeave");
      scheduleSleep();
    }

    function requestState(nextPhase) {
      if (phase === nextPhase) {
        queuedPhase = null;
        return;
      }

      const current = clips[phase];
      if (current?.waitOnExit && !immediateStates.has(nextPhase)) {
        queuedPhase = nextPhase;
        return;
      }

      transitionTo(nextPhase);
    }

    function handleEnded(event) {
      if (event.target !== activeVideo) return;
      const endedPhase = phase;

      if (queuedPhase) {
        const next = queuedPhase;
        queuedPhase = null;
        transitionTo(next);
        return;
      }

      const current = clips[endedPhase];
      if (current?.loop) {
        try {
          activeVideo.currentTime = clipStartTime(current);
        } catch {}
        activeVideo.play().catch(() => {});
        return;
      }

      if (current?.next) {
        transitionTo(current.next);
        if (current.next === "idle") scheduleSleep();
      }
    }

    catA.addEventListener("ended", handleEnded);
    catB.addEventListener("ended", handleEnded);

    window.electronAPI.onCatState((state) => {
      if (symbolEntryOpen) return;
      if (state === "typing") {
        enterTyping();
      } else if (mode === "typing") {
        enterIdleFromTyping();
      } else if (mode === "idle") {
        scheduleSleep();
      } else if (mode === "sleep") {
        scheduleSleep();
      }
    });

    pet.addEventListener("mousedown", (event) => {
      if (event.button !== 0) return;
      if (symbolEntryOpen) return;
      clearSleepTimer();
      setMousePassthrough(false);
      dragging = true;
      lastX = event.screenX;
      lastY = event.screenY;
    });

    window.addEventListener("mousemove", (event) => {
      queueHitTest(event);
      if (!dragging) return;
      const deltaX = event.screenX - lastX;
      const deltaY = event.screenY - lastY;
      lastX = event.screenX;
      lastY = event.screenY;
      window.electronAPI.dragWindow(deltaX, deltaY);
    });

    window.addEventListener("mouseup", () => {
      dragging = false;
      if (lastPointerEvent) {
        queueHitTest(lastPointerEvent);
      }
    });

    window.addEventListener("mouseleave", () => {
      if (!dragging && !symbolEntryOpen) {
        setMousePassthrough(true);
      }
    });

    pet.addEventListener("dblclick", (event) => {
      event.preventDefault();
      if (symbolEntryOpen) {
        closeSymbolEntry();
      }
      window.electronAPI.toggleBubbleMode();
    });

    pet.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      if (symbolEntryOpen) {
        closeSymbolEntry();
        return;
      }
      openSymbolEntry();
    });

    symbolEntry.addEventListener("mousedown", (event) => {
      event.stopPropagation();
      dragging = false;
    });

    symbolEntry.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    symbolEntry.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      event.stopPropagation();
      closeSymbolEntry();
    });

    symbolEntryClose.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      closeSymbolEntry();
    });

    symbolEntryRemove.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      void removeCurrentSymbol();
    });

    symbolEntryForm.addEventListener("submit", (event) => {
      event.preventDefault();
      void submitSymbolEntry();
    });

    symbolEntryInput.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        event.preventDefault();
        closeSymbolEntry();
      }
    });

    transitionTo("begin");
    setMousePassthrough(true);
  </script>
</body>
</html>
