<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetClaw Market Bubble</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: block;
      padding: 10px 12px 18px 10px;
    }

    .bubble {
      width: 182px;
      min-height: 238px;
      padding: 13px 12px 10px;
      border-radius: 16px;
      background: rgba(11, 15, 22, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 18px 28px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: relative;
      color: rgba(244, 248, 255, 0.94);
      overflow: hidden;
      transition:
        border-color 180ms ease,
        box-shadow 180ms ease,
        background 180ms ease;
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: 16px;
      bottom: -4px;
      width: 12px;
      height: 12px;
      background: rgba(11, 15, 22, 0.94);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0 0 10px 10px;
      transform: rotate(34deg);
      box-shadow: 5px 6px 10px rgba(0, 0, 0, 0.08);
    }

    body.focus-mode .topline,
    body.focus-mode #marketMeta,
    body.focus-mode #marketFootline,
    body.focus-mode #alertText {
      display: none !important;
    }

    body.focus-mode #focusTitle,
    body.focus-mode #focusSummary,
    body.focus-mode #focusMeta {
      display: block !important;
    }

    body.market-mode #focusTitle,
    body.market-mode #focusSummary,
    body.market-mode #focusMeta {
      display: none !important;
    }

    .screen-grid {
      display: grid;
      gap: 6px;
      min-height: 100%;
      align-content: start;
      grid-template-rows: auto 1fr auto auto;
    }

    .topline,
    .footline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
    }

    .name {
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #ffffff;
      line-height: 1;
      min-width: 0;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .code {
      color: rgba(186, 198, 224, 0.76);
      font-size: 9px;
      line-height: 1;
      white-space: nowrap;
    }

    .price {
      font-size: 27px;
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 700;
      color: #f8fbff;
      transition: color 180ms ease;
    }

    .price-block {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      min-height: 0;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .updated-at {
      font-size: 9px;
      line-height: 1;
      color: rgba(186, 198, 224, 0.76);
      white-space: nowrap;
      min-width: 50px;
      text-align: right;
    }

    .meta {
      display: grid;
      gap: 3px;
      font-size: 10px;
      color: rgba(198, 208, 226, 0.8);
      margin-top: 0;
      align-self: end;
      padding-top: 6px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chart-wrap {
      height: auto;
      min-height: 116px;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .chart {
      width: 100%;
      height: 100%;
      display: block;
    }

    .chart-line {
      fill: none;
      stroke: rgba(214, 224, 239, 0.82);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart-dot {
      fill: currentColor;
    }

    .chart-tag {
      fill: currentColor;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .chart-baseline {
      stroke: rgba(255, 255, 255, 0.12);
      stroke-width: 1;
      stroke-dasharray: 3 3;
    }

    .value-up {
      color: #ff6b81;
    }

    .value-down {
      color: #43d08a;
    }

    body.trend-up .bubble {
      border-color: rgba(255, 107, 129, 0.28);
      box-shadow:
        0 18px 28px rgba(0, 0, 0, 0.24),
        0 0 24px rgba(255, 107, 129, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    body.trend-down .bubble {
      border-color: rgba(67, 208, 138, 0.28);
      box-shadow:
        0 18px 28px rgba(0, 0, 0, 0.24),
        0 0 24px rgba(67, 208, 138, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    body.trend-up .price {
      color: #ff7f96;
    }

    body.trend-down .price {
      color: #54d999;
    }

    body.trend-up .chart-line {
      stroke: #ff7f96;
    }

    body.trend-down .chart-line {
      stroke: #54d999;
    }

    .status-rail {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-top: 2px;
    }

    .status-lines {
      display: grid;
      gap: 4px;
      flex: 1;
    }

    .status-line {
      height: 3px;
      border-radius: 999px;
      background: rgba(214, 224, 239, 0.16);
      overflow: hidden;
      position: relative;
    }

    .status-line::after {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--line-width, 55%);
      border-radius: inherit;
      background: rgba(214, 224, 239, 0.58);
    }

    .status-line:nth-child(2)::after {
      width: var(--line-width-2, 78%);
    }

    .status-line:nth-child(3)::after {
      width: var(--line-width-3, 34%);
    }

    .status-lines.warning .status-line::after {
      background: rgba(255, 211, 126, 0.72);
    }

    .status-lines.danger .status-line::after {
      background: rgba(255, 159, 159, 0.76);
    }

    .focus-title {
      font-size: 24px;
      line-height: 1.28;
      letter-spacing: -0.05em;
      font-weight: 700;
      color: #f8fbff;
      margin: 0 0 8px;
    }

    .focus-summary {
      display: grid;
      gap: 8px;
      margin-top: 6px;
      font-size: 11px;
      color: rgba(220, 230, 246, 0.84);
    }

    .focus-summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .focus-meta {
      margin-top: 10px;
      font-size: 10px;
      color: rgba(182, 193, 212, 0.66);
    }

    .error-text {
      color: #ff9f9f;
    }
  </style>
</head>
<body>
  <div class="bubble">
    <div class="screen-grid">
      <div class="topline">
        <span class="name" id="symbolName">东阳光</span>
        <span class="code" id="symbolCode">600673</span>
      </div>

      <div class="price-block">
        <div class="price-row">
          <div class="price" id="priceValue">--</div>
          <span class="updated-at" id="updatedAt">--:--:--</span>
        </div>
        <div class="chart-wrap" id="chartWrap">
          <svg class="chart" id="intradayChart" viewBox="0 0 160 120" preserveAspectRatio="none" aria-hidden="true">
            <line class="chart-baseline" x1="0" y1="60" x2="160" y2="60"></line>
            <polyline class="chart-line" id="chartLine" points=""></polyline>
            <circle class="chart-dot" id="chartDot" cx="0" cy="0" r="1.8" hidden></circle>
            <text class="chart-tag" id="chartPriceTag" x="0" y="0" hidden>--</text>
          </svg>
        </div>
      </div>
      <div class="meta" id="marketMeta">
        <div class="meta-row">
          <span>涨跌幅</span>
          <span id="changePercent">--</span>
        </div>
        <div class="meta-row">
          <span>持仓盈亏</span>
          <span id="positionChangePercent">--</span>
        </div>
      </div>

      <div class="footline" id="marketFootline">
        <div class="status-rail">
          <div class="status-lines" id="statusLines" aria-hidden="true">
            <span class="status-line"></span>
            <span class="status-line"></span>
            <span class="status-line"></span>
          </div>
        </div>
      </div>
      <div class="focus-title" id="focusTitle" hidden>专注中</div>
      <div class="focus-summary" id="focusSummary" hidden>
        <div class="focus-summary-row">
          <span>本轮按键</span>
          <span id="currentFocusKeyCount">--</span>
        </div>
        <div class="focus-summary-row">
          <span>最近一轮</span>
          <span id="lastFocusKeyCount">--</span>
        </div>
        <div class="focus-summary-row">
          <span>今日累计</span>
          <span id="totalFocusKeyCount">--</span>
        </div>
      </div>
      <div class="focus-meta" id="focusMeta" hidden>双击切模式，右键隐藏气泡</div>
    </div>
  </div>

  <script>
    const els = {
      symbolName: document.getElementById("symbolName"),
      symbolCode: document.getElementById("symbolCode"),
      priceValue: document.getElementById("priceValue"),
      chartWrap: document.getElementById("chartWrap"),
      chartLine: document.getElementById("chartLine"),
      chartDot: document.getElementById("chartDot"),
      chartPriceTag: document.getElementById("chartPriceTag"),
      changePercent: document.getElementById("changePercent"),
      positionChangePercent: document.getElementById("positionChangePercent"),
      statusLines: document.getElementById("statusLines"),
      updatedAt: document.getElementById("updatedAt"),
      marketMeta: document.getElementById("marketMeta"),
      marketFootline: document.getElementById("marketFootline"),
      focusTitle: document.getElementById("focusTitle"),
      focusSummary: document.getElementById("focusSummary"),
      currentFocusKeyCount: document.getElementById("currentFocusKeyCount"),
      lastFocusKeyCount: document.getElementById("lastFocusKeyCount"),
      totalFocusKeyCount: document.getElementById("totalFocusKeyCount"),
      focusMeta: document.getElementById("focusMeta"),
    };

    function formatPrice(value) {
      if (typeof value !== "number" || Number.isNaN(value)) return "--";
      return value.toFixed(2);
    }

    function formatPercent(value) {
      if (typeof value !== "number" || Number.isNaN(value)) return "--";
      return `${value >= 0 ? "+" : ""}${value.toFixed(2)}%`;
    }

    function formatQuoteTime(raw) {
      const text = String(raw || "").trim();
      if (!text) return "--:--:--";
      if (/^\d{14}$/.test(text)) {
        return `${text.slice(8, 10)}:${text.slice(10, 12)}:${text.slice(12, 14)}`;
      }

      const matched = text.match(/(\d{2}):(\d{2}):(\d{2})$/);
      if (matched) {
        return `${matched[1]}:${matched[2]}:${matched[3]}`;
      }

      return "--:--:--";
    }

    function applyValueColor(element, value) {
      element.className = "";
      if (typeof value !== "number" || Number.isNaN(value) || value === 0) {
        return;
      }
      element.classList.add(value > 0 ? "value-up" : "value-down");
    }

    function buildChartState(items, width = 160, height = 120, padding = 8) {
      if (!Array.isArray(items) || items.length < 2) return null;
      const prices = items.map((item) => item?.price).filter((value) => typeof value === "number");
      if (prices.length < 2) return null;

      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;

      const points = items
        .map((item, index) => {
          const x = (index / (items.length - 1)) * width;
          const y = height - padding - (((item.price - min) / range) * (height - padding * 2));
          return `${x.toFixed(2)},${y.toFixed(2)}`;
        })
        .join(" ");

      const lastItem = items[items.length - 1];
      const lastX = width;
      const lastY = height - padding - (((lastItem.price - min) / range) * (height - padding * 2));
      return {
        points,
        lastX,
        lastY,
        lastPrice: lastItem.price,
      };
    }

    function applyStatus(kind) {
      els.statusLines.className = "status-lines";
      if (kind === "warning") els.statusLines.classList.add("warning");
      if (kind === "danger") els.statusLines.classList.add("danger");
    }

    function updateChartTag(chartState) {
      if (!chartState || typeof chartState.lastPrice !== "number") {
        els.chartDot.hidden = true;
        els.chartPriceTag.hidden = true;
        return;
      }

      const text = formatPrice(chartState.lastPrice);
      const tagX = Math.max(4, Math.min(chartState.lastX - 2, 126));
      const tagY = Math.max(9, Math.min(chartState.lastY - 3, 34));

      els.chartDot.hidden = false;
      els.chartDot.setAttribute("cx", chartState.lastX.toFixed(2));
      els.chartDot.setAttribute("cy", chartState.lastY.toFixed(2));

      els.chartPriceTag.hidden = false;
      els.chartPriceTag.textContent = text;
      els.chartPriceTag.setAttribute("x", tagX.toFixed(2));
      els.chartPriceTag.setAttribute("y", tagY.toFixed(2));
    }

    function formatCount(value) {
      if (typeof value !== "number" || Number.isNaN(value) || value <= 0) return "0次";
      return `${value}次`;
    }

    function showMarketView() {
      document.body.classList.remove("focus-mode");
      document.body.classList.add("market-mode");
      els.symbolName.hidden = false;
      els.priceValue.hidden = false;
      els.chartWrap.hidden = false;
      els.focusTitle.hidden = true;
      els.focusSummary.hidden = true;
      els.focusMeta.hidden = true;
      els.marketMeta.hidden = false;
      els.marketFootline.hidden = false;
      els.symbolCode.hidden = false;
    }

    function applyTrendState(changePercent) {
      document.body.classList.remove("trend-up", "trend-down", "trend-flat");

      if (typeof changePercent !== "number" || Number.isNaN(changePercent) || changePercent === 0) {
        document.body.classList.add("trend-flat");
        return;
      }

      document.body.classList.add(changePercent > 0 ? "trend-up" : "trend-down");
    }

    function showFocusView() {
      document.body.classList.remove("market-mode");
      document.body.classList.add("focus-mode");
      els.symbolName.hidden = true;
      els.priceValue.hidden = true;
      els.chartWrap.hidden = true;
      els.focusTitle.hidden = false;
      els.focusSummary.hidden = false;
      els.focusMeta.hidden = false;
      els.marketMeta.hidden = true;
      els.marketFootline.hidden = true;
      els.symbolCode.hidden = true;
    }

    function renderSnapshot(snapshot) {
      if (!snapshot) return;

      const config = snapshot.config || {};
      const activeSymbol = snapshot.activeSymbol || config.symbol || {};
      const quote = snapshot.quote || null;
      const lastAlert = snapshot.lastAlert || null;
      const error = snapshot.error || "";
      const bubbleMode = snapshot.bubbleMode || "market";
      const focusState = snapshot.focusState || "idle";
      const focusSummary = snapshot.focusSummary || {
        currentTypingKeyCount: 0,
        lastTypingKeyCount: 0,
        totalTypingKeyCount: 0,
      };

      const displayName = quote?.name || activeSymbol?.name || "未配置";
      els.symbolName.textContent = displayName;
      els.symbolCode.textContent = activeSymbol?.code || quote?.code || "--";

      if (bubbleMode === "focus") {
        showFocusView();
        if (focusState === "typing") {
          els.focusTitle.textContent = "专注中";
        } else {
          els.focusTitle.textContent = "空闲中";
        }
        els.currentFocusKeyCount.textContent = formatCount(focusSummary.currentTypingKeyCount);
        els.lastFocusKeyCount.textContent = formatCount(focusSummary.lastTypingKeyCount);
        els.totalFocusKeyCount.textContent = formatCount(focusSummary.totalTypingKeyCount);
        return;
      }

      showMarketView();
      applyTrendState(quote?.changePercent);

      if (quote) {
        els.priceValue.textContent = formatPrice(quote.price);
        els.changePercent.textContent = formatPercent(quote.changePercent);
        applyValueColor(els.changePercent, quote.changePercent);
        els.positionChangePercent.textContent = formatPercent(quote.positionChangePercent);
        applyValueColor(els.positionChangePercent, quote.positionChangePercent);
        els.updatedAt.textContent = formatQuoteTime(quote.updatedAt);
        const chartState = buildChartState(quote.intraday);
        els.chartLine.setAttribute("points", chartState?.points || "");
        updateChartTag(chartState);
        els.chartWrap.hidden = !Array.isArray(quote.intraday) || quote.intraday.length < 2;
      } else {
        els.priceValue.textContent = "--";
        els.changePercent.textContent = "--";
        els.positionChangePercent.textContent = "--";
        els.changePercent.className = "";
        els.positionChangePercent.className = "";
        els.updatedAt.textContent = "--:--:--";
        els.chartLine.setAttribute("points", "");
        updateChartTag(null);
        els.chartWrap.hidden = true;
      }

      if (error) {
        applyStatus("danger");
        return;
      }

      if (lastAlert) {
        applyStatus(lastAlert.level === "danger" ? "danger" : "warning");
        return;
      }

      applyStatus("normal");
    }

    async function init() {
      const snapshot = await window.electronAPI.getMarketSnapshot();
      renderSnapshot(snapshot);

      window.electronAPI.onMarketSnapshot(renderSnapshot);
      window.electronAPI.onMarketAlert(renderSnapshot);
    }

    init().catch((error) => {
      renderSnapshot({
        error: error?.message || String(error),
        config: {},
        quote: null,
        lastAlert: null,
      });
    });
  </script>
</body>
</html>
